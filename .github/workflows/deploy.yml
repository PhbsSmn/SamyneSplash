name: Build & Deploy Splash

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp
      
      - name: Deploy via SFTP (mirror)
        run: |
          lftp -u "${{ secrets.SFTP_USER }},${{ secrets.SFTP_PASSWORD }}" sftp://${{ secrets.SFTP_HOST }} <<EOF
          set sftp:auto-confirm yes
          mkdir -p /customers/***/www/splash
          mirror -R --delete _site /customers/***/www/splash
          quit
          EOF
